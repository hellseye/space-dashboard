<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ISS Tracker</title>

    <link rel="stylesheet" href="style.css" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  </head>
  <body>
    <div class="dashboard">
      <div class="header">
        <h2>🚀 SPACE DASHBOARD</h2>
        <p id="time">--time--</p>
      </div>

      <div id="map"></div>

      <div class="info-panel">
        <div><h3>🛰️ ISS STATUS</h3></div>
        <div>
          <p >latitude : <span id="coords-lat">--</span></p>
          <p >longitude : <span id="coords-lon">--</span></p>
          <p >velocity : <span id="speed">--</span></p>
          <p >altitude : <span id="altitude">--</span></p>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="script.js"></script>
  </body>
</html>
